<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Periodic Table — QuickUtils</title>
    <meta name="keywords" content="QuickUtils, periodic, table, code, design, productivity, online tools">
    <meta name="robots" content="index, follow">
    <meta property="og:url" content="https://quickutils.top/periodic-table/">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="description" content="Free interactive periodic table of elements. Explore chemical properties, electron configurations, and comprehensive data for every element.">
    <link rel="canonical" href="https://elements.quickutils.top">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧪</text></svg>">
    <meta property="og:title" content="Interactive Periodic Table">
    <meta property="og:description" content="Explore elements and their properties interactively.">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5193703345853377" crossorigin="anonymous"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ELEMENTS001"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-ELEMENTS001');</script>
</head>
<body>
    <nav class="navbar"><div class="container nav-inner">
        <a href="/" class="brand">🧪 <span>PeriodicTable</span></a>
        <div class="nav-links">
            <a href="https://ko-fi.com/dayatin" target="_blank" rel="noopener" class="kofi-link">☕ Support</a>
            <a href="https://quickutils.top" target="_blank" rel="noopener">QuickUtils</a>
        </div>
        <button class="theme-btn" id="themeBtn" aria-label="Toggle theme">🌙</button>
    </div></nav>

    <main class="container main-content">
        <div class="top-controls">
            <div class="search-wrap">
                <input type="text" id="searchInput" placeholder="Search by name, symbol, or atomic number..." autocomplete="off">
            </div>
            <div class="mode-toggles" style="display:flex; gap:0.5rem; margin-top:0.5rem;">
                <button class="btn btn-secondary btn-sm" id="quizModeBtn">🎓 Quiz Mode</button>
            </div>
            <div class="legend-filter" id="legendFilter">
                <!-- Populated by JS -->
            </div>
        </div>

        <div class="table-wrapper">
            <div class="periodic-grid" id="periodicTable">
                <!-- Elements injected by JS -->
            </div>
        </div>

    </main>

    <!-- Side Panel for Element Details -->
    <div class="element-panel glass-panel" id="elementPanel">
        <div class="panel-header">
            <button class="icon-btn" id="closePanelBtn">❌</button>
        </div>
        <div class="panel-content" id="panelContent">
            <div class="text-center text-muted" style="padding: 2rem">Select an element to view details.</div>
        </div>
    </div>

    <footer class="footer"><div class="container footer-inner">
        <div class="footer-brand"><span>🧪 Periodic Table</span><p>Part of <a href="https://quickutils.top">QuickUtils</a></p></div>
        <p class="copyright">© 2026 QuickUtils.</p>
    </div></footer>

    <script src="script.js"></script>
    <script src='https://storage.ko-fi.com/cdn/scripts/overlay-widget.js'></script>
    <script>kofiWidgetOverlay.draw('dayatin',{'type':'floating-chat','floating-chat.donateButton.text':'Support Us','floating-chat.donateButton.background-color':'#ff5e5b','floating-chat.donateButton.text-color':'#fff'});</script>
</body>
</html>
